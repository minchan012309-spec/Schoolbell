<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교무실 호출 시스템 - 학생용</title>
    <style>
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-Regular.woff2') format('woff2');
        }
        * { font-family: 'Paperlogy', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 20px; background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 600px; min-height: 650px; display: flex; flex-direction: column; position: relative; }
        
        .page { display: none; flex-direction: column; height: 100%; flex: 1; }
        .page.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 1.8rem; color: #1e293b; margin-bottom: 10px; }
        .subtitle { color: #64748b; margin-bottom: 25px; }

        /* 그리드 개선 */
        .grid { display: grid; gap: 8px; margin-bottom: 20px; }
        .btn-opt { background: #f8fafc; border: 2px solid #e2e8f0; padding: 15px 5px; border-radius: 12px; cursor: pointer; text-align: center; font-weight: 600; color: #475569; transition: 0.2s; }
        .btn-opt.selected { background: #eff6ff; border-color: #2563eb; color: #2563eb; }

        input { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 15px; font-size: 1.1rem; margin-bottom: 15px; outline: none; }

        /* 롱 프레스 버튼 스타일 */
        .long-press-area { margin-top: auto; position: relative; width: 100%; height: 75px; border-radius: 20px; background: #e2e8f0; overflow: hidden; cursor: pointer; }
        .progress-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: #1d4ed8; transition: width 0.1s linear; }
        .press-btn-text { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: bold; color: white; z-index: 2; pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .long-press-area.disabled { background: #cbd5e0; cursor: not-allowed; }
        .long-press-area.disabled .press-btn-text { color: #94a3b8; }

        /* 토스 스타일 체크 애니메이션 */
        .success-checkmark { width: 80px; height: 80px; margin: 0 auto 30px; }
        .check-icon { width: 80px; height: 80px; position: relative; border-radius: 50%; box-sizing: content-box; border: 4px solid #4CAF50; }
        .check-icon::after { content: ''; position: absolute; left: 14px; top: 38px; width: 20px; height: 40px; border-right: 4px solid #4CAF50; border-bottom: 4px solid #4CAF50; transform: rotate(45deg); transform-origin: 100% 100%; animation: checkmark 0.6s ease; }
        @keyframes checkmark { 0% { height: 0; width: 0; opacity: 0; } 40% { height: 0; width: 20px; opacity: 1; } 100% { height: 40px; width: 20px; opacity: 1; } }

        #holdingOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.95); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="page1" class="page active">
        <h1>선생님 호출</h1>
        <p class="subtitle">담당 선생님을 선택하세요.</p>
        <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
            <div class="btn-opt" onclick="sel('t','김국어')">김국어</div>
            <div class="btn-opt" onclick="sel('t','이수학')">이수학</div>
            <div class="btn-opt" onclick="sel('t','박영어')">박영어</div>
            <div class="btn-opt" onclick="sel('t','최과학')">최과학</div>
            <div class="btn-opt" onclick="sel('t','정정보')">정정보</div>
        </div>
        <button class="btn-opt" id="n1" disabled onclick="go(2)" style="margin-top:auto; background:#2563eb; color:white; border:none; padding:20px; border-radius:20px;">다음 단계</button>
    </div>

    <div id="page2" class="page">
        <h1>정보 입력</h1>
        <div class="grid" id="classGrid" style="grid-template-columns: repeat(5, 1fr);"></div>
        <div class="grid" id="numGrid" style="grid-template-columns: repeat(6, 1fr); max-height: 180px; overflow-y: auto; padding-right: 5px;"></div>
        <input type="text" id="nameInp" placeholder="성함 입력" oninput="val2()">
        <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
            <div class="btn-opt" onclick="sel('p','질문')">질문</div>
            <div class="btn-opt" onclick="sel('p','제출')">제출</div>
            <div class="btn-opt" onclick="sel('p','상담')">상담</div>
        </div>
        
        <div class="long-press-area disabled" id="longPressBtn">
            <div class="progress-bar" id="progressBar"></div>
            <div class="press-btn-text" id="btnText">꾹 눌러서 전송</div>
        </div>
    </div>

    <div id="page3" class="page" style="text-align:center; justify-content:center;">
        <div class="success-checkmark">
            <div class="check-icon"></div>
        </div>
        <h1 style="margin-top: 20px;">호출을 보냈어요</h1>
        <p class="subtitle">선생님이 확인하실 때까지<br>잠시만 밖에서 기다려 주세요.</p>
        <button onclick="location.reload()" style="background:#f1f5f9; border:none; padding:15px 30px; border-radius:15px; color:#64748b; font-weight:bold; cursor:pointer;">처음으로</button>
    </div>
</div>

<div id="holdingOverlay">
    <h1 id="holdMsg">선생님께 신호를 보내는 중...</h1>
</div>

<script>
    let data = { t:'', b:'', n:'', name:'', p:'' };
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyAX-64IIAjJmLS-GOf-dQ2X_qdsLasSqI1lnFeHJFaGZsohBN4a-U2RToE_nZ8mKdU/exec"; 

    function go(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById('page'+p).classList.add('active');
    }

    const cg = document.getElementById('classGrid');
    for(let i=1; i<=10; i++) cg.innerHTML += `<div class="btn-opt" onclick="sel('b','${i}')">${i}반</div>`;
    const ng = document.getElementById('numGrid');
    for(let i=1; i<=35; i++) ng.innerHTML += `<div class="btn-opt" onclick="sel('n','${i}')">${i}번</div>`;

    function sel(k, v) {
        event.target.parentElement.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('selected'));
        event.target.classList.add('selected');
        data[k] = v;
        if(k==='t') document.getElementById('n1').disabled = false;
        val2();
    }

    function val2() {
        data.name = document.getElementById('nameInp').value;
        const ok = data.b && data.n && data.name && data.p;
        const btn = document.getElementById('longPressBtn');
        if(ok) btn.classList.remove('disabled');
        else btn.classList.add('disabled');
    }

    // 롱 프레스 로직
    let pressTimer;
    let progress = 0;
    const holdBtn = document.getElementById('longPressBtn');
    const bar = document.getElementById('progressBar');
    const bTxt = document.getElementById('btnText');

    function startPress(e) {
        if(holdBtn.classList.contains('disabled')) return;
        
        // 10분 체크
        const studentId = `2${data.b.padStart(2,'0')}${data.n.padStart(2,'0')}`;
        const lastCall = localStorage.getItem('lastCallTime_' + studentId);
        if (lastCall && new Date().getTime() - lastCall < 600000) {
            alert("10분 이내에 재호출이 불가능합니다.");
            return;
        }

        pressTimer = setInterval(() => {
            progress += 3.33; // 약 3초 (30번 호출)
            bar.style.width = progress + "%";
            bTxt.innerText = "꾹 누르세요!";
            
            if(progress >= 100) {
                clearInterval(pressTimer);
                executeSubmit(studentId);
            }
        }, 100);
    }

    function endPress() {
        clearInterval(pressTimer);
        if(progress < 100) {
            progress = 0;
            bar.style.width = "0%";
            bTxt.innerText = "꾹 눌러서 전송";
        }
    }

    holdBtn.addEventListener('mousedown', startPress);
    holdBtn.addEventListener('touchstart', startPress);
    window.addEventListener('mouseup', endPress);
    window.addEventListener('touchend', endPress);

    function executeSubmit(id) {
        // 실제 전송
        fetch(GAS_URL, {
            method: "POST",
            mode: 'no-cors',
            body: JSON.stringify({ teacher: data.t, id: id, name: data.name, purpose: data.p })
        });

        localStorage.setItem('lastCallTime_' + id, new Date().getTime());
        
        // 심리적 홀딩 레이어 (선택 사항, 바로 결과 페이지 가도 됨)
        document.getElementById('holdingOverlay').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('holdingOverlay').style.display = 'none';
            go(3);
        }, 1500);
    }
</script>
</body>
</html>
