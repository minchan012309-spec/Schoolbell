<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교무실 호출 수신 대시보드</title>
    <style>
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-Regular.woff2') format('woff2');
            font-weight: 400;
        }
        * { font-family: 'Paperlogy', sans-serif; margin:0; padding:0; box-sizing:border-box; }
        body { background: #f0f4f8; color: #2d3748; height: 100vh; display: flex; flex-direction: column; padding: 30px; }
        
        #startLayer { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.95); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .start-btn { background: #3182ce; color: white; padding: 25px 50px; border-radius: 20px; font-size: 1.8rem; cursor: pointer; border:none; box-shadow: 0 10px 20px rgba(49,130,206,0.3); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .status-dot { width: 12px; height: 12px; background: #48bb78; border-radius: 50%; display: inline-block; margin-right: 8px; }

        /* 메인 호출 카드 */
        .alert-card { background: white; border-radius: 32px; padding: 60px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 4px solid transparent; transition: 0.5s; display: none; margin: auto; width: 100%; max-width: 900px; }
        .alert-card.active { display: block; border-color: #3182ce; animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-10px); } 75% { transform: translateY(-5px); } }
        
        .t-label { color: #3182ce; font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .t-name { font-size: 5rem; color: #1a202c; margin-bottom: 30px; }
        .info-box { background: #f8fafc; border-radius: 20px; padding: 40px; margin-top: 20px; }
        .msg { font-size: 3rem; line-height: 1.4; color: #4a5568; }
        .highlight { color: #3182ce; font-weight: bold; }

        .empty-state { font-size: 2rem; color: #a0aec0; text-align: center; margin-top: 150px; }
    </style>
</head>
<body>

<div id="startLayer">
    <h1 style="margin-bottom:30px; color:#1a202c;">교무실 수신 시스템</h1>
    <button class="start-btn" onclick="initSystem()">수신 시작하기</button>
    <p style="margin-top:20px; color:#718096;">소리 알림을 위해 버튼을 눌러주세요.</p>
</div>

<div class="header">
    <h2 style="font-size:1.5rem; color:#3182ce;"><span class="status-dot"></span>실시간 호출 모니터링 중</h2>
    <div id="clock" style="font-size:1.2rem; color:#718096;"></div>
</div>

<div class="empty-state" id="empty">현재 대기 중인 호출이 없습니다.</div>

<div class="alert-card" id="card">
    <div class="t-label">호출된 선생님</div>
    <div class="t-name" id="tName">홍길동 선생님</div>
    <div class="info-box">
        <div class="msg">
            <span class="highlight" id="sInfo">20101 김민찬</span> 학생<br>
            목적: <span class="highlight" id="sPurp">수행평가 질문</span>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyAX-64IIAjJmLS-GOf-dQ2X_qdsLasSqI1lnFeHJFaGZsohBN4a-U2RToE_nZ8mKdU/exec";
    let lastTime = new Date().getTime();
    let voice = null;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);

    function loadVoices() {
        voice = window.speechSynthesis.getVoices().find(v => v.lang.includes('ko'));
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;

    function initSystem() {
        document.getElementById('startLayer').style.display = 'none';
        loadVoices();
        setInterval(checkCall, 3000);
    }

    async function checkCall() {
        try {
            const res = await fetch(GAS_URL + "?type=latest");
            const d = await res.json();
            if(d.id && d.timestamp > lastTime) {
                lastTime = d.timestamp;
                notify(d);
            }
        } catch(e) {}
    }

    function notify(d) {
        document.getElementById('empty').style.display = 'none';
        document.getElementById('tName').innerText = `${d.teacher} 선생님`;
        document.getElementById('sInfo').innerText = `${d.id} ${d.name}`;
        document.getElementById('sPurp').innerText = d.purpose;
        
        const card = document.getElementById('card');
        card.classList.add('active');

        // 알림음
        const audio = new Audio('https://t1.daumcdn.net/kakaopay/tesla/20230728/sfx/ding.mp3');
        audio.play().then(() => {
            setTimeout(() => {
                const txt = `${d.teacher} 선생님, ${d.id} ${d.name} 학생의 ${d.purpose} 호출입니다.`;
                const uttr = new SpeechSynthesisUtterance(txt);
                uttr.voice = voice;
                uttr.lang = 'ko-KR';
                uttr.rate = 1.0;
                window.speechSynthesis.speak(uttr);
            }, 800);
        });

        // 20초 후 다시 대기 상태로
        setTimeout(() => {
            card.classList.remove('active');
            document.getElementById('empty').style.display = 'block';
        }, 20000);
    }
</script>
</body>
</html>
